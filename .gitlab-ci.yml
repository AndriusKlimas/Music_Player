stages:
  - build

build-job:
  stage: build
  script:
    - echo "Starting build job"
    - echo $SHELL
    - bash --version
    - python3 --version
    - echo "Environment variables set"
    - echo $DOCKER_PASSWORD | docker login -u $DOCKER_USERNAME --password-stdin
    - python3 build.py $CI_COMMIT_TAG
    - docker logout
  rules:
    - if: $CI_COMMIT_TAG
